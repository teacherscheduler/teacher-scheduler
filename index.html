<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Teacher Availability Scheduler</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
  .page { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { font-size: 24px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .sub { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
  .tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; border-bottom: 1px solid #ddd; }
  .tab { padding: 9px 20px; font-size: 14px; cursor: pointer; border: none; background: none; color: #888; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; font-weight: 600; }
  .tab:hover:not(.active) { color: #333; }
  .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  label { font-size: 13px; color: #666; display: block; margin-bottom: 5px; }
  input[type=text] { width: 100%; padding: 9px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; outline: none; transition: border 0.15s; }
  input[type=text]:focus { border-color: #888; }
  .btn { padding: 8px 18px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; cursor: pointer; transition: background 0.15s; }
  .btn:hover { background: #f5f5f0; }
  .btn.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; font-weight: 500; }
  .btn.primary:hover { background: #333; }
  .btn.danger { background: #fff5f5; color: #c0392b; border-color: #f5c6c6; }
  .btn.danger:hover { background: #fee; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .cal-outer { overflow-x: auto; }
  .cal-header { display: grid; grid-template-columns: 76px repeat(7,1fr); gap: 3px; margin-bottom: 3px; min-width: 540px; }
  .cal-header span { font-size: 11px; color: #888; text-align: center; font-weight: 600; padding: 4px 0; }
  .cal-row { display: grid; grid-template-columns: 76px repeat(7,1fr); gap: 3px; margin-bottom: 3px; min-width: 540px; }
  .time-label { font-size: 11px; color: #888; text-align: right; padding-right: 8px; line-height: 28px; white-space: nowrap; }
  .slot { height: 28px; border-radius: 5px; border: 1px solid #e5e5e5; cursor: pointer; transition: background 0.1s; background: #f9f9f7; }
  .slot.available { background: #c0dd97; border-color: #97c459; }
  .slot:hover { border-color: #aaa; }
  .period-label { font-size: 10px; font-weight: 700; color: #aaa; text-transform: uppercase; padding: 8px 0 3px; min-width: 540px; letter-spacing: 0.06em; }
  .legend { display: flex; gap: 16px; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; font-size: 13px; color: #666; }
  .legend-dot { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; }
  .status { font-size: 13px; padding: 9px 12px; border-radius: 8px; margin-bottom: 1rem; }
  .status.success { background: #edfaf1; color: #1e8449; border: 1px solid #a9dfbf; }
  .status.info { background: #eaf4fb; color: #1a6a9a; border: 1px solid #aed6f1; }
  .status.error { background: #fff5f5; color: #c0392b; border: 1px solid #f5c6c6; }
  .teacher-card { background: #f9f9f7; border: 1px solid #e5e5e5; border-radius: 10px; padding: 1rem; margin-bottom: 12px; }
  .teacher-name { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
  .mini-outer { overflow-x: auto; }
  .mini-grid { display: grid; grid-template-columns: 76px repeat(7,1fr); gap: 2px; min-width: 400px; }
  .mini-slot { height: 12px; border-radius: 2px; background: #efefed; border: 1px solid #e5e5e5; }
  .mini-slot.av { background: #c0dd97; border-color: #97c459; }
  .mini-label { font-size: 9px; color: #aaa; line-height: 12px; text-align: right; padding-right: 5px; white-space: nowrap; overflow: hidden; }
  .mini-head { font-size: 9px; color: #888; text-align: center; font-weight: 600; }
  .no-data { color: #aaa; font-size: 14px; padding: 2.5rem; text-align: center; }
  .row-flex { display: flex; gap: 10px; align-items: flex-end; }
  .row-flex > div { flex: 1; }
  .meta { font-size: 12px; color: #aaa; margin-top: 6px; }
  .week-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .week-nav span { font-size: 14px; font-weight: 600; color: #1a1a1a; min-width: 160px; text-align: center; }
  .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 10px; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #ddd; border-top-color: #1a1a1a; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="page">
  <h1>Teacher Availability Scheduler</h1>
  <p class="sub">IST &middot; 4:00 AM – 12:00 AM &middot; Mark your availability &middot; Admin sees all submissions</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('teacher')">Teacher View</button>
    <button class="tab" onclick="switchTab('admin')">Admin View</button>
  </div>

  <!-- TEACHER TAB -->
  <div id="teacher-tab">
    <div class="card">
      <div class="row-flex" style="margin-bottom:1rem;">
        <div>
          <label>Your name</label>
          <input type="text" id="teacher-name" placeholder="e.g. Ms. Sharma" />
        </div>
        <div>
          <label>Subject (optional)</label>
          <input type="text" id="teacher-subject" placeholder="e.g. Mathematics" />
        </div>
      </div>
      <div id="name-msg" class="status info" style="display:none;"></div>
    </div>

    <div class="card">
      <div class="legend">
        <div style="display:flex;align-items:center;gap:6px;"><div class="legend-dot" style="background:#c0dd97;border:1px solid #97c459;"></div> Available</div>
        <div style="display:flex;align-items:center;gap:6px;"><div class="legend-dot" style="background:#f9f9f7;border:1px solid #e5e5e5;"></div> Unavailable</div>
        <span style="margin-left:auto;font-size:12px;color:#aaa;">Click cells to toggle &middot; Scroll to see all hours</span>
      </div>
      <div class="week-nav">
        <button class="btn" onclick="changeWeek(-1)">&#8592;</button>
        <span id="week-label"></span>
        <button class="btn" onclick="changeWeek(1)">&#8594;</button>
      </div>
      <div class="cal-outer"><div id="cal-wrap"></div></div>
    </div>

    <div id="save-status" style="display:none;margin-bottom:1rem;"></div>
    <button class="btn primary" id="save-btn" onclick="saveAvailability()" style="width:100%;padding:12px;font-size:15px;">Save Availability</button>
  </div>

  <!-- ADMIN TAB -->
  <div id="admin-tab" style="display:none;">
    <div class="card">
      <div class="admin-header">
        <div>
          <div style="font-size:15px;font-weight:600;">All Teachers</div>
          <div id="teacher-count" class="meta"></div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn" onclick="loadAdmin()">Refresh</button>
          <button class="btn danger" onclick="clearAll()">Clear all</button>
        </div>
      </div>
      <div class="week-nav">
        <button class="btn" onclick="changeAdminWeek(-1)">&#8592;</button>
        <span id="admin-week-label"></span>
        <button class="btn" onclick="changeAdminWeek(1)">&#8594;</button>
      </div>
      <div id="admin-list"><div class="no-data">Click Refresh to load teacher availability.</div></div>
    </div>
  </div>
</div>

<script>
  const BIN_ID = '69bd62ebaa77b81da901dd38';
  const MASTER_KEY = '$2a$10$HUKcJaif43cfUxh/.4eh6eOxTenNonDa9njlkvX5qsrm/R9jq32Cu';
  const API = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

  const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const SLOTS = [];
  for (let h = 4; h <= 23; h++) { SLOTS.push(h+':00'); if(h<23) SLOTS.push(h+':30'); }
  SLOTS.push('0:00');

  const PERIOD_LABELS = {
    dawn:'Early Morning (4–6 AM)', morning:'Morning (6 AM–12 PM)',
    afternoon:'Afternoon (12–5 PM)', evening:'Evening (5–8 PM)', night:'Night (8 PM–12 AM)'
  };

  function getPeriod(slot) {
    const h = parseInt(slot);
    if(h===0) return 'night'; if(h<6) return 'dawn'; if(h<12) return 'morning';
    if(h<17) return 'afternoon'; if(h<20) return 'evening'; return 'night';
  }

  function toAmPm(slot) {
    const [h,m] = slot.split(':').map(Number);
    const mm = m?'30':'00';
    if(h===0) return '12:'+mm+' AM';
    if(h<12) return h+':'+mm+' AM';
    if(h===12) return '12:'+mm+' PM';
    return (h-12)+':'+mm+' PM';
  }

  let weekOffset=0, adminWeekOffset=0, grid={};

  function getMonday(offset) {
    const d = new Date(); const day = d.getDay()||7;
    d.setDate(d.getDate()-day+1+offset*7); d.setHours(0,0,0,0); return d;
  }
  function getWeekKey(offset) { return getMonday(offset).toISOString().slice(0,10); }
  function getWeekDates(offset) {
    const mon = getMonday(offset);
    return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(d.getDate()+i); return d; });
  }
  function fmtWeek(offset) {
    const dd=getWeekDates(offset); const o={month:'short',day:'numeric'};
    return dd[0].toLocaleDateString('en-IN',o)+' – '+dd[6].toLocaleDateString('en-IN',o);
  }

  function renderCalendar() {
    const dates=getWeekDates(weekOffset);
    document.getElementById('week-label').textContent=fmtWeek(weekOffset);
    const wrap=document.getElementById('cal-wrap'); wrap.innerHTML='';
    const hdr=document.createElement('div'); hdr.className='cal-header';
    hdr.innerHTML='<span></span>'+DAYS.map((d,i)=>`<span>${d}<br>${dates[i].getDate()}</span>`).join('');
    wrap.appendChild(hdr);
    let lastP=null;
    SLOTS.forEach(slot=>{
      const p=getPeriod(slot);
      if(p!==lastP){ lastP=p; const pl=document.createElement('div'); pl.className='period-label'; pl.textContent=PERIOD_LABELS[p]; wrap.appendChild(pl); }
      const row=document.createElement('div'); row.className='cal-row';
      const lbl=document.createElement('div'); lbl.className='time-label'; lbl.textContent=toAmPm(slot); row.appendChild(lbl);
      DAYS.forEach(day=>{
        const cell=document.createElement('div');
        const key=weekOffset+'_'+day+'_'+slot;
        cell.className='slot'+(grid[key]?' available':'');
        cell.onclick=()=>{ grid[key]=!grid[key]; cell.className='slot'+(grid[key]?' available':''); };
        row.appendChild(cell);
      });
      wrap.appendChild(row);
    });
  }

  function changeWeek(d){ weekOffset+=d; renderCalendar(); }
  function changeAdminWeek(d){ adminWeekOffset+=d; loadAdmin(); }

  async function getBinData() {
    const res = await fetch(API+'/latest', { headers:{'X-Master-Key':MASTER_KEY} });
    const json = await res.json();
    return json.record || {teachers:[]};
  }

  async function setBinData(data) {
    await fetch(API, {
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':MASTER_KEY},
      body: JSON.stringify(data)
    });
  }

  async function saveAvailability() {
    const name = document.getElementById('teacher-name').value.trim();
    if(!name){
      const m=document.getElementById('name-msg');
      m.textContent='Please enter your name first.'; m.className='status info'; m.style.display='block';
      setTimeout(()=>m.style.display='none',3000); return;
    }
    const btn=document.getElementById('save-btn');
    btn.innerHTML='<span class="spinner"></span>Saving...'; btn.disabled=true;

    const weekKey=getWeekKey(weekOffset);
    const subject=document.getElementById('teacher-subject').value.trim();
    const slots={};
    Object.keys(grid).filter(k=>k.startsWith(weekOffset+'_')&&grid[k]).forEach(k=>{
      const p=k.split('_'); const day=p[1],time=p[2];
      if(!slots[day]) slots[day]=[];
      slots[day].push(time);
    });

    const ss=document.getElementById('save-status');
    try {
      const data = await getBinData();
      if(!data.teachers) data.teachers=[];
      const idx = data.teachers.findIndex(t=>t.name===name&&t.weekKey===weekKey);
      const entry={name,subject,weekKey,slots,updatedAt:new Date().toISOString()};
      if(idx>=0) data.teachers[idx]=entry; else data.teachers.push(entry);
      await setBinData(data);
      ss.textContent='✓ Saved successfully! Admin can now see your availability.';
      ss.className='status success';
    } catch(e) {
      ss.textContent='Error saving. Please check your connection and try again.';
      ss.className='status error';
    }
    ss.style.display='block'; setTimeout(()=>ss.style.display='none',4000);
    btn.innerHTML='Save Availability'; btn.disabled=false;
  }

  async function loadAdmin() {
    document.getElementById('admin-week-label').textContent=fmtWeek(adminWeekOffset);
    const adminList=document.getElementById('admin-list');
    adminList.innerHTML='<div class="no-data"><span class="spinner"></span>Loading...</div>';
    const weekKey=getWeekKey(adminWeekOffset);
    try {
      const data=await getBinData();
      const entries=(data.teachers||[]).filter(t=>t.weekKey===weekKey);
      document.getElementById('teacher-count').textContent=entries.length+' teacher'+(entries.length!==1?'s':'')+' submitted for this week';
      if(entries.length===0){ adminList.innerHTML='<div class="no-data">No availability submitted for this week yet.</div>'; return; }
      adminList.innerHTML='';
      entries.forEach(d=>{
        const card=document.createElement('div'); card.className='teacher-card';
        let html='<div class="teacher-name">'+d.name+(d.subject?' <span style="font-weight:400;font-size:13px;color:#888;">· '+d.subject+'</span>':'')+'</div>';
        html+='<div class="mini-outer"><div class="mini-grid">';
        html+='<div></div>';
        DAYS.forEach(dy=>{ html+='<div class="mini-head">'+dy.slice(0,2)+'</div>'; });
        SLOTS.forEach(sl=>{
          html+='<div class="mini-label">'+toAmPm(sl)+'</div>';
          DAYS.forEach(dy=>{ const av=d.slots&&d.slots[dy]&&d.slots[dy].includes(sl); html+='<div class="mini-slot'+(av?' av':'')+'"></div>'; });
        });
        html+='</div></div>';
        html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">';
        html+='<div class="meta">Updated: '+new Date(d.updatedAt).toLocaleString('en-IN')+'</div>';
        html+='<button class="btn danger" style="padding:4px 12px;font-size:12px;" onclick="deleteTeacher(\''+d.name+'\',\''+d.weekKey+'\')">Remove</button>';
        html+='</div>';
        card.innerHTML=html; adminList.appendChild(card);
      });
    } catch(e) {
      adminList.innerHTML='<div class="no-data">Error loading data. Check your connection.</div>';
    }
  }

  async function deleteTeacher(name, weekKey) {
    if(!confirm('Remove '+name+'\'s submission?')) return;
    try {
      const data=await getBinData();
      data.teachers=(data.teachers||[]).filter(t=>!(t.name===name&&t.weekKey===weekKey));
      await setBinData(data); loadAdmin();
    } catch(e){ alert('Error removing. Try again.'); }
  }

  async function clearAll() {
    if(!confirm('Clear ALL teacher availability? This cannot be undone.')) return;
    try { await setBinData({teachers:[]}); loadAdmin(); }
    catch(e){ alert('Error clearing. Try again.'); }
  }

  function switchTab(tab) {
    document.getElementById('teacher-tab').style.display=tab==='teacher'?'block':'none';
    document.getElementById('admin-tab').style.display=tab==='admin'?'block':'none';
    document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='teacher')||(i===1&&tab==='admin')));
    if(tab==='admin') loadAdmin();
  }

  renderCalendar();
  document.getElementById('admin-week-label').textContent=fmtWeek(0);
</script>
</body>
</html>
